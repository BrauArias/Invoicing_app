    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    /* ── Brand tokens ─────────────────────────── */
    :root {
      --red:     #d2232a;
      --red-dk:  #a81b21;
      --red-lt:  #e8454b;
      --red-xs:  #fef2f2;
      --navy:    #1a1a2e;
      --navy-md: #16213e;
      --navy-lt: #0f3460;
      --gray:    #d6d6d6;
      --gray-dk: #6b7280;
      --off-wh:  #fafafa;
    }

    /* ── Layout helpers ───────────────────────── */
    .dot-grid {
      background-color: var(--off-wh);
      background-image: radial-gradient(circle, #d1d5db 1.2px, transparent 1.2px);
      background-size: 22px 22px;
    }

    /* ── Gradients ────────────────────────────── */
    .grad-red  { background: linear-gradient(135deg, var(--red) 0%, var(--red-lt) 100%); }
    .grad-navy { background: linear-gradient(135deg, var(--navy) 0%, var(--navy-lt) 100%); }
    .grad-mixed{ background: linear-gradient(135deg, var(--red) 0%, #6366f1 100%); }

    .grad-text-red {
      background: linear-gradient(135deg, var(--red), var(--red-lt));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .grad-text-mixed {
      background: linear-gradient(135deg, var(--red), #7c3aed);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .grad-text-navy {
      background: linear-gradient(135deg, var(--navy-lt), #6366f1);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    /* ── Glassmorphism ────────────────────────── */
    .glass {
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.9);
      box-shadow: 0 4px 28px rgba(0,0,0,0.06);
    }
    .glass-dark {
      background: rgba(22,33,62,0.72);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.07);
    }

    /* ── Ambient orb ──────────────────────────── */
    .orb {
      position: absolute; border-radius: 50%;
      filter: blur(64px); pointer-events: none; opacity: 0.13;
    }

    /* ── Gradient border card ─────────────────── */
    .grad-border { position: relative; border-radius: 20px; background: white; }
    .grad-border::before {
      content: ''; position: absolute; inset: -1.5px;
      border-radius: 21px;
      background: linear-gradient(135deg, var(--red), #6366f1, var(--red-lt));
      z-index: -1; opacity: 0.5;
    }

    /* ── Animations ───────────────────────────── */
    @keyframes fadeUp { from{opacity:0;transform:translateY(26px)} to{opacity:1;transform:translateY(0)} }
    @keyframes floatY { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    @keyframes scaleIn{ from{opacity:0;transform:scale(0.93)} to{opacity:1;transform:scale(1)} }
    @keyframes pulseRed{ 0%,100%{box-shadow:0 0 0 0 rgba(210,35,42,0.3)} 50%{box-shadow:0 0 0 14px rgba(210,35,42,0)} }

    .anim-fade-up  { animation: fadeUp  0.7s ease-out both; }
    .anim-scale-in { animation: scaleIn 0.65s ease-out both; }
    .anim-float    { animation: floatY  7s ease-in-out infinite; }
    .anim-pulse    { animation: pulseRed 2.8s ease-in-out infinite; }
    .d1{animation-delay:.1s} .d2{animation-delay:.22s} .d3{animation-delay:.34s}
    .d4{animation-delay:.46s} .d5{animation-delay:.58s} .d6{animation-delay:.7s}

    /* ── Nav link ─────────────────────────────── */
    .nav-link { transition: color .2s; }
    .nav-link:hover { color: var(--red); }

    /* ── Tab button ───────────────────────────── */
    .tab-btn { transition: all .2s; border-bottom: 2.5px solid transparent; cursor: pointer; }
    .tab-btn.active { border-bottom-color: var(--red); color: var(--red); }
    .tab-btn:not(.active):hover { color: #4b5563; }

    /* ── Card hover ───────────────────────────── */
    .card-hover { transition: transform .25s, box-shadow .25s; }
    .card-hover:hover { transform: translateY(-5px); box-shadow: 0 16px 44px rgba(0,0,0,0.11); }

    /* ── Product card accent ──────────────────── */
    .product-card {
      border-top: 3px solid transparent;
      transition: border-color .25s, transform .25s, box-shadow .25s;

    .product-card:hover { transform: translateY(-4px); box-shadow: 0 14px 40px rgba(0,0,0,0.10); }

      border: 1px solid rgba(0,0,0,0.07);
      backdrop-filter: blur(8px);
      border-radius: 10px; padding: 9px 20px;
      font-weight: 700; font-size: 12px;
      letter-spacing: .05em; color: #374151; white-space: nowrap;

      width: 100%; background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px; padding: 11px 16px;

    .hero-card-3d {
      transform: rotateY(-10deg) rotateX(3deg);

    .alert.show { display: flex; align-items: center; gap: 8px; }
    .alert-ok { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
    .alert-err{ background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: var(--gray); border-radius: 3px; }

const FORMSPREE_ID = 'YOUR_FORMSPREE_ID';

const Contact = () => {
  const [form, setForm] = useState({name:'',email:'',company:'',service:'',message:''});
  const [status, setStatus] = useState('idle');

  const set = k => e => setForm(f=>({...f,[k]:e.target.value}));

  const handleSubmit = async (e) => {
    e.preventDefault();
    if (FORMSPREE_ID === 'YOUR_FORMSPREE_ID') {
      alert('Configura tu FORMSPREE_ID en el codigo para activar el formulario.');
      return;
    }
    setStatus('sending');
    try {
      const res = await fetch(`https://formspree.io/f/${FORMSPREE_ID}`, {
        method:'POST',
        headers:{'Content-Type':'application/json','Accept':'application/json'},
        body: JSON.stringify({
          Nombre:   form.name,
          Email:    form.email,
          Empresa:  form.company,
          Servicio: form.service,
          Mensaje:  form.message,
          _subject: `Auditoria IA PowerHelp — ${form.name} · ${form.service}`,
          _replyto: form.email,
          _template: 'table',
        }),
      });
      if (res.ok) {
        setStatus('ok');
        setForm({name:'',email:'',company:'',service:'',message:''});
      } else {
        setStatus('error');
      }
    } catch {
      setStatus('error');
    }
  };

  return (

             aria-labelledby="contact-h2">

              <button type="submit" disabled={status==='sending'}

                {status==='sending'
