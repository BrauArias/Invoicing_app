<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PowerPulse AI — Admin Panel</title>
  <meta name="robots" content="noindex, nofollow" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #080b14; color: #e2e8f0; }
    :root {
      --red: #d2232a; --red-lt: #e8454b; --violet: #7c3aed;
      --bg: #080b14; --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --glass: rgba(255,255,255,0.04); --glass2: rgba(255,255,255,0.07);
    }
    .dot-bg {
      background-color: var(--bg);
      background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
      background-size: 24px 24px;
    }
    .card { background: var(--glass); border: 1px solid var(--border); border-radius: 16px; backdrop-filter: blur(12px); }
    .card-hover { transition: border-color .2s, background .2s; }
    .card-hover:hover { border-color: var(--border2); background: var(--glass2); }
    .grad-red { background: linear-gradient(135deg,var(--red),var(--red-lt)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .grad-btn { background: linear-gradient(135deg,var(--red),var(--red-lt)); }
    .sidebar { width: 220px; min-width: 220px; }
    .nav-item { display:flex; align-items:center; gap:10px; padding:9px 14px; border-radius:10px; font-size:13px; font-weight:500; color:#6b7280; cursor:pointer; transition:all .18s; user-select:none; border:1px solid transparent; }
    .nav-item:hover { background: var(--glass2); color:#e2e8f0; }
    .nav-item.active { background:rgba(210,35,42,0.1); color:#f87171; border-color:rgba(210,35,42,0.2); }
    .inp { width:100%; background:rgba(255,255,255,0.04); border:1px solid var(--border2); border-radius:10px; padding:10px 14px; color:#e2e8f0; font-size:13px; font-family:inherit; outline:none; transition:border-color .2s; }
    .inp::placeholder { color:#4b5563; }
    .inp:focus { border-color:rgba(210,35,42,0.5); background:rgba(255,255,255,0.06); }
    textarea.inp { resize:vertical; min-height:120px; }
    select.inp { cursor:pointer; appearance:none; }
    .lbl { display:block; font-size:11px; font-weight:600; color:#6b7280; letter-spacing:.06em; text-transform:uppercase; margin-bottom:7px; }
    .badge { display:inline-flex; align-items:center; gap:5px; border-radius:999px; padding:3px 10px; font-size:10px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; }
    .badge-green { background:rgba(16,185,129,.12); color:#34d399; border:1px solid rgba(16,185,129,.2); }
    .badge-red   { background:rgba(210,35,42,.12);  color:#f87171; border:1px solid rgba(210,35,42,.2); }
    .badge-blue  { background:rgba(99,102,241,.12); color:#818cf8; border:1px solid rgba(99,102,241,.2); }
    .badge-yellow{ background:rgba(245,158,11,.12); color:#fcd34d; border:1px solid rgba(245,158,11,.2); }
    .tbl { width:100%; border-collapse:collapse; }
    .tbl th { font-size:10px; font-weight:700; color:#4b5563; text-transform:uppercase; letter-spacing:.06em; padding:10px 14px; border-bottom:1px solid var(--border); text-align:left; }
    .tbl td { font-size:12px; color:#9ca3af; padding:11px 14px; border-bottom:1px solid rgba(255,255,255,0.04); vertical-align:top; }
    .tbl tr:hover td { background:rgba(255,255,255,0.02); color:#e2e8f0; }
    .tbl tr:last-child td { border-bottom:none; }
    ::-webkit-scrollbar { width:5px; height:5px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:3px; }
    .orb { position:absolute; border-radius:50%; filter:blur(80px); pointer-events:none; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .fade-in { animation: fadeIn .3s ease-out both; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .spin { animation: spin .8s linear infinite; display:inline-block; }
    @keyframes pulseGlow { 0%,100%{box-shadow:0 0 0 0 rgba(210,35,42,0)} 50%{box-shadow:0 0 16px 0 rgba(210,35,42,0.15)} }
    .stat-pulse { animation: pulseGlow 3s ease-in-out infinite; }
    .dot-live { width:7px; height:7px; border-radius:50%; background:#34d399; box-shadow:0 0 6px #34d399; animation: spin 0s; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
    .dot-live { animation: blink 2s ease-in-out infinite; }
  </style>
</head>
<body>
<div id="root"></div>

/* ── Toast ─────────────────────────────────── */
const Toast = ({type, msg}) => {
  if (!msg) return null;
  const styles = {
    ok:    'bg-emerald-500/10 border-emerald-500/30 text-emerald-300',
    error: 'bg-red-500/10 border-red-500/30 text-red-300',
    info:  'bg-blue-500/10 border-blue-500/30 text-blue-300',
  };
  return (
    <div className={`fixed bottom-6 right-6 z-50 flex items-center gap-2.5 border rounded-xl px-4 py-3 text-sm font-medium shadow-2xl fade-in ${styles[type]||styles.info}`}>
      <Ic k={type==='ok'?'Check':type==='error'?'Alert':'Zap'} s={15}/>
      {msg}
    </div>
  );

        <div className="flex items-center justify-center gap-3 mb-8">
          <div className="w-10 h-10 rounded-xl flex items-center justify-center shadow-lg" style={{background:'linear-gradient(135deg,#d2232a,#e8454b)'}}>
            <Ic k="Power" s={18} c="text-white"/>

          <div>
            <p className="text-white font-black text-lg leading-none">PowerPulse <span className="grad-red">AI</span></p>
            <p className="text-gray-500 text-[10px] uppercase tracking-widest mt-0.5">Admin Panel</p>
          </div>
        </div>
        <p className="text-gray-400 text-sm text-center mb-6">Acceso restringido. Introduce la Admin Key.</p>
        <form onSubmit={submit} className="space-y-4">
          <div>
            <label className="lbl">Admin Key</label>
            <div className="relative">
              <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"><Ic k="Lock" s={14}/></span>

                     style={{paddingLeft:36, borderColor: err?'rgba(210,35,42,0.6)':undefined}}/>
              <button type="button" onClick={()=>setShow(!show)}

/* ══════════════════════════════════════════════
   CONFIG PANEL
══════════════════════════════════════════════ */
const ConfigPanel = ({sb, setSb, dbStatus, setDbStatus, onConnect, settings, setSettings, loadingSettings, onSave, saving, saveResult}) => {
  const [showKey, setShowKey] = useState(false);
  const [localUrl, setLocalUrl] = useState(sb.url);
  const [localAnon, setLocalAnon] = useState(sb.anon);

  const handleConnect = () => {
    if (!localUrl || !localAnon) return;
    setSb({url: localUrl, anon: localAnon});
    try { localStorage.setItem(LS_URL, localUrl); localStorage.setItem(LS_KEY, localAnon); } catch {}
    onConnect(localUrl, localAnon);
  };

  return (
    <div className="space-y-6 fade-in">
      <div>
        <h1 className="text-xl font-black text-white mb-1">Configuración del Sistema</h1>
        <p className="text-gray-500 text-sm">Conexión a Supabase, modelo IA y prompt maestro.</p>
      </div>

      {/* ── Supabase connection ── */}

/* ══════════════════════════════════════════════
   ROOT APP
══════════════════════════════════════════════ */
const App = () => {
  const [auth,    setAuth]    = useState(false);
  const [section, setSection] = useState('config');
  const [dbStatus,setDbStatus]= useState('disconnected');
  const [sbClient, setSbClient] = useState(null);
  const [sb, setSb] = useState({
    url:  (() => { try { return localStorage.getItem(LS_URL)||''; } catch { return ''; }})(),
    anon: (() => { try { return localStorage.getItem(LS_KEY)||''; } catch { return ''; }})(),
  });

  // Settings state (mirrors settings table row id=1)
  const [settings, setSettings] = useState({
    provider_name: 'groq', ai_model: 'llama3-8b-8192', ai_key: '', system_prompt: DEFAULT_PROMPT,
  });
  const [loadingSettings, setLoadingSettings] = useState(false);
  const [saving, setSaving]   = useState(false);
  const [saveResult, setSaveResult] = useState(null);

  // Leads state
  const [leads, setLeads]           = useState([]);
  const [loadingLeads, setLoadingLeads] = useState(false);

  // Toast
  const [toast, setToast] = useState(null);
  const showToast = (type, msg) => {
    setToast({type,msg});
    setTimeout(()=>setToast(null), 3500);
  };

  // ── Connect to Supabase and load all data ──
  const connectAndLoad = useCallback(async (url, anon) => {
    if (!url || !anon) return;
    setDbStatus('connecting');
    try {
      const client = createClient(url, anon);
      setSbClient(client);

      // Test connection + load settings
      setLoadingSettings(true);
      const { data: sData, error: sErr } = await client.from('settings').select('*').eq('id', 1).maybeSingle();
      setLoadingSettings(false);

      if (sErr) { setDbStatus('error'); showToast('error', `Error: ${sErr.message}`); return; }
      if (sData) setSettings(s => ({...s, ...sData}));

      setDbStatus('connected');

      // Load leads
      setLoadingLeads(true);
      const { data: lData, error: lErr } = await client.from('leads').select('*').order('created_at', {ascending: false});
      setLoadingLeads(false);
      if (!lErr && lData) setLeads(lData);

      showToast('ok', `Conectado. ${sData?'Settings cargadas.':''} ${lData?.length||0} leads cargados.`);

      // Realtime subscription for new leads
      client.channel('leads-realtime')
        .on('postgres_changes', {event:'INSERT', schema:'public', table:'leads'}, payload => {
          setLeads(prev => [payload.new, ...prev]);
          showToast('info', `Nuevo lead: ${payload.new.name||'Anónimo'} — ${payload.new.company||''}`);
        })
        .on('postgres_changes', {event:'UPDATE', schema:'public', table:'leads'}, payload => {
          setLeads(prev => prev.map(l => l.id === payload.new.id ? payload.new : l));
        })
        .subscribe();

    } catch (e) {
      setDbStatus('error');
      setLoadingSettings(false);
      setLoadingLeads(false);
      showToast('error', 'No se pudo conectar. Verifica URL y Anon Key.');
    }
  }, []);

  // Auto-connect on login if credentials are saved
  useEffect(() => {
    if (auth && sb.url && sb.anon) connectAndLoad(sb.url, sb.anon);
  }, [auth]);

  // ── Save settings to Supabase ──
  const onSave = async () => {
    if (!sbClient) return;
    setSaving(true);
    const { error } = await sbClient.from('settings').upsert({
      id: 1,
      provider_name: settings.provider_name || 'groq',
      ai_model:      settings.ai_model,
      ai_key:        settings.ai_key,
      system_prompt: settings.system_prompt,
      updated_at:    new Date().toISOString(),
    }, { onConflict: 'id' });
    setSaving(false);
    if (error) { setSaveResult('error'); showToast('error', `Error al guardar: ${error.message}`); }
    else        { setSaveResult('ok');   showToast('ok',    'Configuración guardada en Supabase.'); }
    setTimeout(() => setSaveResult(null), 3000);
  };

  // ── Refresh leads ──
  const refreshLeads = async () => {
    if (!sbClient) return;
    setLoadingLeads(true);
    const { data, error } = await sbClient.from('leads').select('*').order('created_at', {ascending: false});
    setLoadingLeads(false);
    if (!error && data) { setLeads(data); showToast('ok', `${data.length} leads actualizados.`); }
    else if (error) showToast('error', error.message);
  };

  // ── Update lead status ──
  const onStatusChange = async (id, newStatus) => {
    setLeads(prev => prev.map(l => l.id===id ? {...l, status:newStatus} : l));
    if (sbClient) {
      const {error} = await sbClient.from('leads').update({status: newStatus}).eq('id', id);
      if (error) showToast('error', `No se pudo actualizar: ${error.message}`);
    }
  };

  if (!auth) return <LoginScreen onLogin={()=>setAuth(true)}/>;

  return (
    <div className="dot-bg min-h-screen flex">
      <div className="orb w-[500px] h-[500px] fixed" style={{top:'-15%',right:'-10%',background:'radial-gradient(circle,#d2232a,transparent)',opacity:.05,zIndex:0}}/>
      <div className="orb w-96 h-96 fixed" style={{bottom:'-10%',left:'-5%',background:'radial-gradient(circle,#7c3aed,transparent)',opacity:.05,zIndex:0}}/>

      <Sidebar active={section} setActive={setSection} dbStatus={dbStatus}/>

      <main className="flex-1 overflow-y-auto relative z-10">
        <div className="max-w-4xl mx-auto px-6 py-8">
          {section==='config' && (
            <ConfigPanel
              sb={sb} setSb={setSb}
              dbStatus={dbStatus} setDbStatus={setDbStatus}
              onConnect={connectAndLoad}
              settings={settings} setSettings={setSettings}
              loadingSettings={loadingSettings}
              onSave={onSave} saving={saving} saveResult={saveResult}
            />
          )}
          {section==='leads' && (
            <LeadsPanel
              leads={leads} loading={loadingLeads}
              onRefresh={refreshLeads} onStatusChange={onStatusChange}
              dbStatus={dbStatus}
            />
          )}
          {section==='stats' && <StatsPanel leads={leads}/>}
        </div>
      </main>

      <Toast type={toast?.type} msg={toast?.msg}/>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
